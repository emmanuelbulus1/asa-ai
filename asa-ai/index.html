<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ASA — Adaptive Smart Assistant — Your Personal Assistant</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --surface2: #1a1a24;
    --border: rgba(255,255,255,0.07);
    --accent: #c8f04a;
    --accent-dim: rgba(200,240,74,0.12);
    --accent-glow: rgba(200,240,74,0.25);
    --text: #f0f0f0;
    --text-muted: #6b6b80;
    --text-soft: #9898aa;
    --asa-bubble: #1e1e2e;
    --user-bubble: var(--accent);
    --user-text: #0a0a0f;
    --radius: 20px;
    --radius-sm: 12px;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    line-height: 1.6;
    overflow: hidden;
  }

  /* ── Layout ── */
  .app {
    display: grid;
    grid-template-rows: auto 1fr auto;
    height: 100vh;
    max-width: 480px;
    margin: 0 auto;
    position: relative;
  }

  /* ── Header ── */
  header {
    padding: 20px 24px 16px;
    display: flex;
    align-items: center;
    gap: 14px;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
    position: relative;
    z-index: 10;
  }

  .avatar {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent) 0%, #8ee000 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 18px;
    color: #0a0a0f;
    flex-shrink: 0;
    box-shadow: 0 0 0 3px var(--accent-dim), 0 0 20px var(--accent-glow);
  }

  .header-info h1 {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 18px;
    letter-spacing: -0.3px;
    line-height: 1.2;
  }

  .status-dot {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 2px;
  }

  .status-dot::before {
    content: '';
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent);
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .header-right {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .logs-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text-muted);
    border-radius: 8px;
    padding: 6px 12px;
    font-size: 12px;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    transition: all 0.2s;
  }

  .logs-btn:hover {
    color: var(--accent);
    border-color: var(--accent-dim);
  }

  /* ── Chat Window ── */
  .chat-window {
    overflow-y: auto;
    padding: 24px 20px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    scroll-behavior: smooth;
  }

  .chat-window::-webkit-scrollbar { width: 4px; }
  .chat-window::-webkit-scrollbar-track { background: transparent; }
  .chat-window::-webkit-scrollbar-thumb { background: var(--surface2); border-radius: 4px; }

  /* ── Messages ── */
  .message {
    display: flex;
    gap: 10px;
    animation: fadeUp 0.3s ease forwards;
    opacity: 0;
    transform: translateY(8px);
  }

  @keyframes fadeUp {
    to { opacity: 1; transform: translateY(0); }
  }

  .message.user {
    flex-direction: row-reverse;
  }

  .msg-avatar {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: var(--surface2);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    flex-shrink: 0;
    align-self: flex-end;
  }

  .message.asa .msg-avatar {
    background: linear-gradient(135deg, var(--accent) 0%, #8ee000 100%);
    color: #0a0a0f;
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 12px;
  }

  .bubble {
    max-width: 78%;
    padding: 12px 16px;
    border-radius: var(--radius);
    font-size: 14.5px;
    line-height: 1.65;
    white-space: pre-wrap;
    word-break: break-word;
  }

  .message.asa .bubble {
    background: var(--asa-bubble);
    border: 1px solid var(--border);
    border-bottom-left-radius: 6px;
    color: var(--text);
  }

  .message.user .bubble {
    background: var(--user-bubble);
    color: var(--user-text);
    border-bottom-right-radius: 6px;
    font-weight: 500;
  }

  /* ── Typing indicator ── */
  .typing {
    display: flex;
    gap: 10px;
    align-items: flex-end;
  }

  .typing-dots {
    background: var(--asa-bubble);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    border-bottom-left-radius: 6px;
    padding: 14px 18px;
    display: flex;
    gap: 5px;
    align-items: center;
  }

  .typing-dots span {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--text-muted);
    animation: bounce 1.2s infinite;
  }

  .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
  .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
    30% { transform: translateY(-6px); opacity: 1; }
  }

  /* ── Live Update Banner ── */
  .update-banner {
    background: var(--accent-dim);
    border: 1px solid rgba(200,240,74,0.2);
    border-radius: var(--radius-sm);
    padding: 10px 16px;
    font-size: 13.5px;
    color: var(--accent);
    animation: fadeUp 0.3s ease forwards;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  /* ── Quick Replies ── */
  .quick-replies {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    padding: 0 20px 4px;
  }

  .quick-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text-soft);
    border-radius: 20px;
    padding: 7px 14px;
    font-size: 13px;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .quick-btn:hover {
    background: var(--accent-dim);
    border-color: rgba(200,240,74,0.3);
    color: var(--accent);
  }

  /* ── Input Area ── */
  .input-area {
    padding: 16px 20px 24px;
    border-top: 1px solid var(--border);
    background: var(--bg);
  }

  .input-wrap {
    display: flex;
    gap: 10px;
    align-items: flex-end;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 10px 10px 10px 18px;
    transition: border-color 0.2s;
  }

  .input-wrap:focus-within {
    border-color: rgba(200,240,74,0.3);
    box-shadow: 0 0 0 3px var(--accent-dim);
  }

  textarea {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14.5px;
    line-height: 1.5;
    resize: none;
    min-height: 24px;
    max-height: 120px;
    overflow-y: auto;
  }

  textarea::placeholder { color: var(--text-muted); }

  .send-btn {
    width: 38px;
    height: 38px;
    border-radius: 12px;
    background: var(--accent);
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all 0.2s;
  }

  .send-btn:hover { background: #d4f558; transform: scale(1.05); }
  .send-btn:active { transform: scale(0.97); }
  .send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  .send-btn svg { width: 18px; height: 18px; }

  /* ── Logs Panel ── */
  .logs-panel {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 100;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .logs-panel.open { display: flex; }

  .logs-inner {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 24px;
    width: 100%;
    max-width: 420px;
    max-height: 80vh;
    overflow-y: auto;
    padding: 24px;
  }

  .logs-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
  }

  .logs-header h2 {
    font-family: 'Syne', sans-serif;
    font-size: 16px;
    font-weight: 700;
  }

  .close-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text-muted);
    border-radius: 8px;
    padding: 6px 12px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
  }

  .log-item {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 12px 14px;
    margin-bottom: 10px;
    font-size: 13px;
  }

  .log-item .log-action {
    font-weight: 600;
    color: var(--accent);
    font-family: 'Syne', sans-serif;
    font-size: 12px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  .log-item .log-time {
    color: var(--text-muted);
    font-size: 11px;
    margin-top: 4px;
  }

  .pref-tag {
    display: inline-block;
    background: var(--accent-dim);
    color: var(--accent);
    border-radius: 6px;
    padding: 3px 8px;
    font-size: 12px;
    margin: 3px 3px 0 0;
  }

  /* ── Watermark ── */
  .watermark {
    text-align: center;
    font-size: 11px;
    color: var(--text-muted);
    padding: 8px 0 2px;
    letter-spacing: 0.3px;
  }

  .watermark span { color: var(--accent); }
</style>
</head>
<body>

<div class="app">

  <!-- Header -->
  <header>
    <div class="avatar">E</div>
    <div class="header-info">
      <h1>Asa</h1>
      <div class="status-dot">Active — ready to help</div>
    </div>
    <div class="header-right">
      <button class="logs-btn" onclick="toggleLogs()">View Logs</button>
    </div>
  </header>

  <!-- Chat Window -->
  <div class="chat-window" id="chatWindow">
    <!-- Welcome message -->
    <div class="message asa">
      <div class="msg-avatar">E</div>
      <div class="bubble">Hey! I'm Asa 👋

I'm your personal AI assistant. Tell me what you need — food orders, rides, shopping — just say the word.

What can I do for you today?</div>
    </div>
  </div>

  <!-- Quick Replies -->
  <div class="quick-replies" id="quickReplies">
    <button class="quick-btn" onclick="quickSend('I\'m hungry, order food for me')">🍔 Order food</button>
    <button class="quick-btn" onclick="quickSend('Order my usual')">🔄 My usual</button>
    <button class="quick-btn" onclick="quickSend('What\'s the status of my order?')">📍 Track order</button>
  </div>

  <!-- Input Area -->
  <div class="input-area">
    <div class="input-wrap">
      <textarea
        id="userInput"
        placeholder="Tell Asa what you need..."
        rows="1"
        onkeydown="handleKey(event)"
        oninput="autoResize(this)"
      ></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M5 12H19M19 12L13 6M19 12L13 18" stroke="#0a0a0f" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>
    <div class="watermark">Powered by <span>ASA — Adaptive Smart Assistant</span> · Agentic AI Challenge '26</div>
  </div>

</div>

<!-- Logs Panel -->
<div class="logs-panel" id="logsPanel">
  <div class="logs-inner">
    <div class="logs-header">
      <h2>📋 Asa's Action Log</h2>
      <button class="close-btn" onclick="toggleLogs()">Close</button>
    </div>
    <div id="logsContent">Loading...</div>
  </div>
</div>

<script>
  // FIX 2: Stable userId — persists across page refreshes via localStorage
  // Without this, every refresh = new user = Asa forgets everything mid-demo
  const USER_ID = (() => {
    const stored = localStorage.getItem("asa_uid");
    if (stored) return stored;
    const fresh = "user_" + Math.random().toString(36).slice(2, 10);
    localStorage.setItem("asa_uid", fresh);
    return fresh;
  })();

  const WS_URL = `ws://${location.hostname}:8080/?userId=${USER_ID}`;
  const API_URL = `http://${location.hostname}:3000`;

  let ws;
  let isWaiting = false;
  let reconnectDelay = 1000; // FIX 5: exponential backoff start

  // FIX 5: WebSocket with heartbeat + exponential backoff reconnect
  // If screen locks or WiFi drops, Asa reconnects and replays order stage
  function connectWS() {
    ws = new WebSocket(WS_URL);

    ws.onopen = () => {
      reconnectDelay = 1000; // reset backoff on successful connect
      showConnectionStatus(true);
    };

    ws.onmessage = (event) => {
      try {
        const data = JSON.parse(event.data);

        // Heartbeat: server pings, client pongs
        if (data.type === "ping") {
          ws.send(JSON.stringify({ type: "pong" }));
          return;
        }

        if (data.type === "order_update") {
          const label = data.replayed ? data.msg + " (status restored)" : data.msg;
          addUpdateBanner(label, data.step, data.total, data.stage);
        }
      } catch {}
    };

    ws.onclose = () => {
      showConnectionStatus(false);
      // Exponential backoff: 1s → 2s → 4s → 8s → max 30s
      setTimeout(connectWS, Math.min(reconnectDelay, 30000));
      reconnectDelay = Math.min(reconnectDelay * 2, 30000);
    };

    ws.onerror = () => ws.close();
  }

  connectWS();

  function showConnectionStatus(connected) {
    const dot = document.querySelector(".status-dot");
    if (!dot) return;
    if (connected) {
      dot.style.color = "";
      dot.textContent = "Active — ready to help";
    } else {
      dot.style.color = "var(--text-muted)";
      dot.textContent = "Reconnecting...";
    }
  }

  // ── Send Message ─────────────────────────────
  async function sendMessage() {
    const input = document.getElementById("userInput");
    const msg = input.value.trim();
    if (!msg || isWaiting) return;

    input.value = "";
    autoResize(input);
    addMessage("user", msg);
    showTyping();
    setWaiting(true);

    try {
      const res = await fetch(`${API_URL}/chat`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message: msg, userId: USER_ID })
      });

      const data = await res.json();
      hideTyping();
      addMessage("asa", data.reply);
    } catch (err) {
      hideTyping();
      addMessage("asa", "Hmm, something went wrong. Try again?");
    }

    setWaiting(false);
  }

  // ── Add Message ──────────────────────────────
  function addMessage(sender, text) {
    const window = document.getElementById("chatWindow");

    const wrap = document.createElement("div");
    wrap.className = `message ${sender}`;

    const avatarEl = document.createElement("div");
    avatarEl.className = "msg-avatar";
    avatarEl.textContent = sender === "asa" ? "A" : "👤";

    const bubble = document.createElement("div");
    bubble.className = "bubble";
    bubble.textContent = text;

    wrap.appendChild(avatarEl);
    wrap.appendChild(bubble);
    window.appendChild(wrap);
    scrollToBottom();
  }

  // ── Live Update Banner — Upgrade 2: animated progress bar ────────────────
  let progressContainer = null;

  function addUpdateBanner(msg, step, total, stage) {
    const chatWindow = document.getElementById("chatWindow");

    // Create or reuse progress container
    if (!progressContainer || stage === "confirmed") {
      progressContainer = document.createElement("div");
      progressContainer.style.cssText = `
        background: var(--accent-dim);
        border: 1px solid rgba(200,240,74,0.2);
        border-radius: 16px;
        padding: 14px 16px;
        animation: fadeUp 0.3s ease forwards;
        margin: 4px 0;
      `;
      chatWindow.appendChild(progressContainer);
    }

    const pct = total ? Math.round((step / total) * 100) : 100;
    progressContainer.innerHTML = `
      <div style="font-size:13.5px;color:var(--accent);margin-bottom:10px;display:flex;align-items:center;gap:8px;">
        ${msg}
      </div>
      ${total ? `
        <div style="background:rgba(255,255,255,0.08);border-radius:99px;height:5px;overflow:hidden;">
          <div style="background:var(--accent);height:100%;width:${pct}%;border-radius:99px;transition:width 0.6s ease;"></div>
        </div>
        <div style="font-size:11px;color:var(--text-muted);margin-top:6px;">Step ${step} of ${total}</div>
      ` : ""}
    `;

    if (stage === "delivered") {
      progressContainer = null; // reset for next order
    }

    scrollToBottom();
  }

  // ── Typing Indicator ─────────────────────────
  let typingEl = null;

  function showTyping() {
    const window = document.getElementById("chatWindow");
    typingEl = document.createElement("div");
    typingEl.className = "typing";
    typingEl.innerHTML = `
      <div class="msg-avatar" style="background:linear-gradient(135deg,#c8f04a,#8ee000);color:#0a0a0f;font-family:Syne,sans-serif;font-weight:800;font-size:12px;width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;">E</div>
      <div class="typing-dots"><span></span><span></span><span></span></div>
    `;
    window.appendChild(typingEl);
    scrollToBottom();
  }

  function hideTyping() {
    if (typingEl) { typingEl.remove(); typingEl = null; }
  }

  // ── Helpers ──────────────────────────────────
  function scrollToBottom() {
    const w = document.getElementById("chatWindow");
    w.scrollTop = w.scrollHeight;
  }

  function setWaiting(val) {
    isWaiting = val;
    document.getElementById("sendBtn").disabled = val;
  }

  function handleKey(e) {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  function autoResize(el) {
    el.style.height = "auto";
    el.style.height = Math.min(el.scrollHeight, 120) + "px";
  }

  function quickSend(text) {
    document.getElementById("userInput").value = text;
    sendMessage();
  }

  // ── Logs Panel ───────────────────────────────
  async function toggleLogs() {
    const panel = document.getElementById("logsPanel");
    const isOpen = panel.classList.contains("open");

    if (!isOpen) {
      panel.classList.add("open");
      await loadLogs();
    } else {
      panel.classList.remove("open");
    }
  }

  async function loadLogs() {
    const content = document.getElementById("logsContent");
    try {
      const res = await fetch(`${API_URL}/logs/${USER_ID}`);
      const data = await res.json();

      if (data.logs.length === 0 && !data.lastOrder) {
        content.innerHTML = `<p style="color:var(--text-muted);font-size:13px;text-align:center;padding:20px 0">No actions yet. Start a conversation with Asa.</p>`;
        return;
      }

      let html = "";

      if (data.preferences.favoriteFood?.length > 0) {
        html += `<div style="margin-bottom:16px">
          <div style="font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px">Asa Remembers</div>
          ${data.preferences.favoriteFood.map(f => `<span class="pref-tag">${f}</span>`).join("")}
          ${data.preferences.usualBudget ? `<span class="pref-tag">Budget: ₦${data.preferences.usualBudget.toLocaleString()}</span>` : ""}
        </div>`;
      }

      if (data.logs.length > 0) {
        html += `<div style="font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:10px">Action Log</div>`;
        html += data.logs.reverse().map(log => `
          <div class="log-item">
            <div class="log-action">${log.action.replace(/_/g," ")}</div>
            ${log.vendor ? `<div>Vendor: ${log.vendor}</div>` : ""}
            ${log.amount ? `<div>Amount: ₦${log.amount.toLocaleString()}</div>` : ""}
            ${log.items ? `<div>Items: ${log.items.join(", ")}</div>` : ""}
                <div class="log-time">${new Date(log.time).toLocaleTimeString()}</div>
          </div>
        `).join("");
      }

      content.innerHTML = html;
    } catch {
      content.innerHTML = `<p style="color:var(--text-muted)">Could not load logs.</p>`;
    }
  }
</script>
</body>
</html>
